<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FOIA Tracker">
<title>FOIA Tracker — FAF Empire</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --border2: #333;
    --text: #e8e8e8;
    --muted: #666;
    --accent: #d4a843;
    --accent2: #e8c068;
    --red: #c0392b;
    --green: #27ae60;
    --blue: #2980b9;
    --orange: #e67e22;
    --purple: #8e44ad;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  .header { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .logo span { color: var(--muted); font-weight: 400; }
  .header-stats { display: flex; gap: 20px; }
  .stat-pill { font-family: var(--mono); font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .stat-pill strong { color: var(--text); font-size: 13px; }

  /* TABS */
  .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); padding: 0 20px; gap: 4px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 10px 16px; font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; margin-bottom: -1px; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN */
  .main { padding: 20px; max-width: 1100px; margin: 0 auto; }
  .view { display: none; }
  .view.active { display: block; }

  /* FILTERS */
  .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .search-box { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; transition: border-color 0.15s; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }
  .filter-select { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; cursor: pointer; }

  /* BUTTONS */
  .btn { padding: 8px 16px; border-radius: 4px; font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: 0.5px; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }
  .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .btn-xs { padding: 3px 8px; font-size: 10px; }

  /* CASE CARDS */
  .cases-grid { display: flex; flex-direction: column; gap: 10px; }
  .case-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; cursor: pointer; transition: all 0.15s; }
  .case-card:hover { border-color: var(--border2); }
  .case-card-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; border-left: 3px solid var(--case-color, var(--muted)); }
  .case-id { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 600; letter-spacing: 1px; }
  .case-title { font-weight: 500; font-size: 14px; color: var(--text); margin-top: 2px; }
  .case-sub { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
  .case-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }

  /* REQUEST MINI-CARDS inside case */
  .requests-strip { border-top: 1px solid var(--border); background: var(--bg); padding: 8px 16px; display: flex; flex-direction: column; gap: 6px; }
  .req-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 7px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; border-left: 3px solid var(--req-color, var(--muted)); }
  .req-row:hover { border-color: var(--border2); }
  .req-label { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 600; }
  .req-agency { font-size: 12px; color: var(--text); }
  .req-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .req-due { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .req-due.overdue { color: var(--red); font-weight: 700; }
  .req-due.soon { color: var(--orange); }

  /* TAGS */
  .tag { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 2px; }
  .tag-status-pending    { background: rgba(230,126,34,0.15); color: var(--orange); }
  .tag-status-submitted  { background: rgba(41,128,185,0.15); color: var(--blue); }
  .tag-status-received   { background: rgba(39,174,96,0.15);  color: var(--green); }
  .tag-status-denied     { background: rgba(192,57,43,0.15);   color: var(--red); }
  .tag-status-appealing  { background: rgba(142,68,173,0.15); color: var(--purple); }
  .tag-status-closed     { background: rgba(100,100,100,0.15); color: var(--muted); }
  .tag-status-delayed    { background: rgba(212,168,67,0.15); color: var(--accent); }
  .tag-state { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; width: 100%; max-width: 700px; animation: slideIn 0.2s ease; flex-shrink: 0; }
  @keyframes slideIn { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
  .close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; transition: color 0.15s; padding: 2px 6px; }
  .close-btn:hover { color: var(--text); }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; }

  /* FORMS */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  input, select, textarea { background: var(--bg); border: 1px solid var(--border2); border-radius: 4px; padding: 9px 12px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; transition: border-color 0.15s; width: 100%; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 72px; }
  select option { background: var(--surface); }

  /* SECTION DIVIDER in modal */
  .form-section-title { grid-column: 1/-1; font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-top: 8px; }

  /* REQUESTS IN CASE MODAL */
  .requests-editor { grid-column: 1/-1; display: flex; flex-direction: column; gap: 10px; }
  .req-editor-card { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; padding: 14px; position: relative; }
  .req-editor-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .req-editor-label { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 600; letter-spacing: 1px; }
  .req-editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .req-editor-grid .full { grid-column: 1/-1; }
  .add-req-btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; background: transparent; border: 1px dashed var(--border2); border-radius: 6px; color: var(--muted); font-family: var(--mono); font-size: 11px; cursor: pointer; width: 100%; transition: all 0.15s; }
  .add-req-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* DETAIL */
  .detail-section { margin-bottom: 24px; }
  .detail-section-title { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-item { display: flex; flex-direction: column; gap: 3px; }
  .detail-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .detail-value { font-size: 13px; color: var(--text); }

  /* REQUEST DETAIL CARDS in detail view */
  .req-detail-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin-bottom: 10px; border-left: 3px solid var(--req-color, var(--muted)); }
  .req-detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .req-detail-title { font-family: var(--mono); font-size: 12px; color: var(--accent); font-weight: 600; }

  /* TIMELINE */
  .notes-list { display: flex; flex-direction: column; gap: 8px; }
  .note-item { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; }
  .note-ts { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .note-text { font-size: 13px; line-height: 1.5; }
  .note-input-row { display: flex; gap: 8px; margin-top: 10px; }
  .note-input-row input { flex: 1; }

  /* DASHBOARD */
  .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; text-align: center; }
  .kpi-value { font-family: var(--mono); font-size: 32px; font-weight: 600; color: var(--accent); line-height: 1; margin-bottom: 6px; }
  .kpi-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
  .dash-section-title { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .recent-item { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: border-color 0.15s; margin-bottom: 6px; }
  .recent-item:hover { border-color: var(--border2); }
  .deadline-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s; }
  .deadline-item:hover { border-color: var(--border2); }

  /* MISC */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); font-family: var(--mono); font-size: 12px; letter-spacing: 1px; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .no-results { text-align: center; padding: 32px; color: var(--muted); font-family: var(--mono); font-size: 12px; }
  .overdue { color: var(--red) !important; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 12px 16px; font-family: var(--mono); font-size: 12px; color: var(--text); z-index: 1000; opacity: 0; transform: translateY(10px); transition: all 0.2s; pointer-events: none; max-width: 280px; }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .req-editor-grid { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
    .header-stats { display: none; }
    .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">FAF<span>/</span>FOIA</div>
  <div class="header-stats">
    <div class="stat-pill">CASES <strong id="hdr-cases">0</strong></div>
    <div class="stat-pill">REQUESTS <strong id="hdr-reqs">0</strong></div>
    <div class="stat-pill">RECEIVED <strong id="hdr-received">0</strong></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-view="dashboard">Dashboard</button>
  <button class="tab" data-view="cases">All Cases</button>
  <button class="tab" data-view="deadlines">Deadlines</button>
</div>

<div class="main">

  <!-- DASHBOARD -->
  <div id="view-dashboard" class="view active">
    <div class="dashboard-grid" id="dash-kpis"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div>
        <div class="dash-section-title">Recent Cases</div>
        <div id="dash-recent"></div>
      </div>
      <div>
        <div class="dash-section-title">⚠ Upcoming Deadlines</div>
        <div id="dash-deadlines"></div>
      </div>
    </div>
  </div>

  <!-- CASES -->
  <div id="view-cases" class="view">
    <div class="filters">
      <input class="search-box" id="search-input" placeholder="Search cases, agencies, subjects..." />
      <select class="filter-select" id="filter-status">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="submitted">Submitted</option>
        <option value="received">Received</option>
        <option value="denied">Denied</option>
        <option value="appealing">Appealing</option>
        <option value="delayed">Delayed</option>
        <option value="closed">Closed</option>
      </select>
      <select class="filter-select" id="filter-state"><option value="">All States</option></select>
      <button class="btn btn-primary" id="add-case-btn">+ New Case</button>
    </div>
    <div class="cases-grid" id="cases-list"></div>
  </div>

  <!-- DEADLINES -->
  <div id="view-deadlines" class="view">
    <div class="dash-section-title" style="margin-bottom:16px">All Request Deadlines</div>
    <div id="deadlines-list"></div>
  </div>

</div>

<!-- CASE MODAL (add/edit) -->
<div class="modal-overlay" id="case-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-mode-label">New Case</div>
      <button class="close-btn" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <!-- CASE INFO -->
        <div class="form-section-title">Case Info</div>
        <div class="form-group full">
          <label>Case / Incident Name *</label>
          <input id="f-name" type="text" placeholder="e.g. Kara Ballard Shooting — Bixby OK" />
        </div>
        <div class="form-group">
          <label>Content Potential</label>
          <select id="f-potential">
            <option value="">— Unrated —</option>
            <option value="high">🔥 High</option>
            <option value="medium">📈 Medium</option>
            <option value="low">📉 Low</option>
          </select>
        </div>
        <div class="form-group">
          <label>Overall Status</label>
          <select id="f-ready">
            <option value="no">❌ No footage yet</option>
            <option value="partial">⚡ Partial — some docs in</option>
            <option value="yes">✅ Ready to edit</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Case Summary / Notes</label>
          <textarea id="f-notes" placeholder="Overview of the incident, key details, officers involved, incident date..."></textarea>
        </div>

        <!-- REQUESTS -->
        <div class="form-section-title">FOIA Requests</div>
        <div class="requests-editor" id="requests-editor"></div>
        <div class="form-group full" style="margin-top:0">
          <button class="add-req-btn" id="add-req-btn" type="button">+ Add Another Request</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="delete-case-btn" style="display:none">Delete Case</button>
      <div style="display:flex;gap:10px;margin-left:auto">
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-save">Save Case</button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" style="max-width:780px">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="detail-id"></div>
        <div style="font-size:16px;font-weight:500;color:var(--text);margin-top:4px" id="detail-name"></div>
      </div>
      <button class="close-btn" id="detail-close">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'faf_foia_v2';
let cases = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

// migrate old v1 data if present
(function migrate() {
  const old = localStorage.getItem('faf_foia_cases');
  if (old && !cases.length) {
    try {
      const oldCases = JSON.parse(old);
      cases = oldCases.map(c => ({
        ...c,
        requests: [{
          rid: 'R1',
          agency: c.agency || '',
          state: c.state || '',
          status: c.status || 'pending',
          submittedDate: c.submittedDate || '',
          dueDate: c.dueDate || '',
          portal: c.portal || '',
          refnum: c.refnum || '',
          request: c.request || '',
        }],
        timeline: c.timeline || [],
      }));
      save();
    } catch(e) {}
  }
})();

let editingId = null;
let draftRequests = [];

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(cases)); }

function genCaseId() {
  const num = String(cases.length + 1).padStart(4, '0');
  return `FAF-${num}`;
}

function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) { if (!d) return '—'; const [y,m,day]=d.split('-'); return `${m}/${day}/${y}`; }
function daysUntil(d) { if (!d) return null; return Math.ceil((new Date(d) - new Date(today())) / 86400000); }

function statusColor(s) {
  return {pending:'var(--orange)',submitted:'var(--blue)',received:'var(--green)',denied:'var(--red)',appealing:'var(--purple)',delayed:'var(--accent)',closed:'var(--muted)'}[s] || 'var(--muted)';
}

// Overall case status = worst/most-active status across its requests
function caseStatus(c) {
  const reqs = c.requests || [];
  if (!reqs.length) return 'pending';
  const priority = ['denied','appealing','delayed','submitted','pending','received','closed'];
  for (const p of priority) { if (reqs.some(r => r.status === p)) return p; }
  return reqs[0].status;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── TABS ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-' + tab.dataset.view).classList.add('active');
    renderAll();
  });
});

// ── RENDER ──
function renderAll() {
  renderHeader();
  renderDashboard();
  renderCases();
  renderDeadlines();
  populateStateFilter();
}

function allRequests() {
  return cases.flatMap(c => (c.requests||[]).map(r => ({ ...r, caseId: c.id, caseName: c.name })));
}

function renderHeader() {
  const reqs = allRequests();
  document.getElementById('hdr-cases').textContent = cases.length;
  document.getElementById('hdr-reqs').textContent = reqs.length;
  document.getElementById('hdr-received').textContent = reqs.filter(r => r.status === 'received').length;
}

// ── DASHBOARD ──
function renderDashboard() {
  const reqs = allRequests();
  const total = cases.length;
  const totalReqs = reqs.length;
  const received = reqs.filter(r => r.status === 'received').length;
  const denied   = reqs.filter(r => r.status === 'denied').length;
  const pending  = reqs.filter(r => r.status === 'pending').length;
  const submitted= reqs.filter(r => r.status === 'submitted').length;
  const delayed  = reqs.filter(r => r.status === 'delayed').length;
  const overdue  = reqs.filter(r => r.dueDate && daysUntil(r.dueDate) < 0 && !['received','closed','denied'].includes(r.status)).length;
  const readyEdit= cases.filter(c => c.ready === 'yes').length;

  document.getElementById('dash-kpis').innerHTML = [
    { label:'Cases',       value: total,     color:'var(--accent)' },
    { label:'Total Reqs',  value: totalReqs, color:'var(--accent)' },
    { label:'Pending',     value: pending,   color:'var(--orange)' },
    { label:'Submitted',   value: submitted, color:'var(--blue)' },
    { label:'Received',    value: received,  color:'var(--green)' },
    { label:'Denied',      value: denied,    color:'var(--red)' },
    { label:'Delayed',     value: delayed,   color:'var(--purple)' },
    { label:'Overdue',     value: overdue,   color: overdue > 0 ? 'var(--red)' : 'var(--muted)' },
    { label:'Ready Edit',  value: readyEdit, color:'var(--green)' },
  ].map(k => `<div class="kpi-card"><div class="kpi-value" style="color:${k.color}">${k.value}</div><div class="kpi-label">${k.label}</div></div>`).join('');

  // recent cases
  const recentEl = document.getElementById('dash-recent');
  const recent = [...cases].reverse().slice(0, 6);
  if (!recent.length) {
    recentEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div>No cases yet</div>';
  } else {
    recentEl.innerHTML = recent.map(c => {
      const cs = caseStatus(c);
      return `<div class="recent-item" onclick="openDetail('${c.id}')">
        <div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--accent)">${c.id}</div>
          <div style="font-size:13px;margin-top:2px">${c.name}</div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--muted)">${(c.requests||[]).length} request${(c.requests||[]).length!==1?'s':''}</div>
        </div>
        <span class="tag tag-status-${cs}">${cs}</span>
      </div>`;
    }).join('');
  }

  // deadlines
  const ddEl = document.getElementById('dash-deadlines');
  const upcoming = allRequests()
    .filter(r => r.dueDate && !['received','closed'].includes(r.status))
    .map(r => ({ ...r, days: daysUntil(r.dueDate) }))
    .sort((a,b) => a.days - b.days)
    .slice(0, 6);

  if (!upcoming.length) {
    ddEl.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:12px;padding:12px 0">No deadlines set</div>';
  } else {
    ddEl.innerHTML = upcoming.map(r => {
      const od = r.days < 0;
      const label = od ? `${Math.abs(r.days)}d OVERDUE` : r.days === 0 ? 'DUE TODAY' : `${r.days}d left`;
      const color = od ? 'var(--red)' : r.days <= 3 ? 'var(--orange)' : 'var(--muted)';
      return `<div class="deadline-item" onclick="openDetail('${r.caseId}')">
        <div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--accent)">${r.caseId} · ${r.rid}</div>
          <div style="font-size:13px">${r.caseName}</div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--muted)">${r.agency}${r.state?' · '+r.state:''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--mono);font-size:11px;color:${color};font-weight:700">${label}</div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">${fmtDate(r.dueDate)}</div>
        </div>
      </div>`;
    }).join('');
  }
}

// ── CASES LIST ──
function populateStateFilter() {
  const states = [...new Set(cases.flatMap(c => (c.requests||[]).map(r => r.state)).filter(Boolean))].sort();
  const sel = document.getElementById('filter-state');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All States</option>' + states.map(s => `<option value="${s}"${s===cur?' selected':''}>${s}</option>`).join('');
}

function renderCases() {
  const search = (document.getElementById('search-input').value || '').toLowerCase();
  const statusF = document.getElementById('filter-status').value;
  const stateF  = document.getElementById('filter-state').value;

  let filtered = cases.filter(c => {
    const reqs = c.requests || [];
    if (statusF && !reqs.some(r => r.status === statusF)) return false;
    if (stateF  && !reqs.some(r => r.state === stateF))   return false;
    if (search) {
      const hay = `${c.name} ${c.notes} ${reqs.map(r => `${r.agency} ${r.state} ${r.refnum} ${r.request}`).join(' ')}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  }).reverse();

  const el = document.getElementById('cases-list');
  if (!filtered.length) {
    el.innerHTML = cases.length
      ? '<div class="no-results">No cases match your filters.</div>'
      : '<div class="empty-state"><div class="empty-icon">🗂️</div>No cases yet.<br>Hit "+ New Case" to log your first one.</div>';
    return;
  }

  el.innerHTML = filtered.map(c => {
    const reqs = c.requests || [];
    const cs = caseStatus(c);
    const potEmoji = {high:'🔥',medium:'📈',low:'📉'}[c.potential] || '';

    const reqRows = reqs.map((r, i) => {
      const days = r.dueDate ? daysUntil(r.dueDate) : null;
      const od = days !== null && days < 0 && !['received','closed','denied'].includes(r.status);
      let dueLabel = '';
      if (r.dueDate && !['received','closed'].includes(r.status)) {
        if (days < 0) dueLabel = `<span class="req-due overdue">⚠ ${Math.abs(days)}d overdue</span>`;
        else if (days === 0) dueLabel = `<span class="req-due overdue">⚠ Due today</span>`;
        else if (days <= 5) dueLabel = `<span class="req-due soon">${days}d left</span>`;
        else dueLabel = `<span class="req-due">${fmtDate(r.dueDate)}</span>`;
      }
      return `<div class="req-row" style="--req-color:${statusColor(r.status)}" onclick="event.stopPropagation();openDetail('${c.id}','${r.rid}')">
        <div>
          <div class="req-label">${r.rid}</div>
          <div class="req-agency">${r.agency}${r.state?' <span style="color:var(--muted);font-size:11px">· '+r.state+'</span>':''}</div>
          ${r.refnum ? `<div style="font-family:var(--mono);font-size:10px;color:var(--muted)">REF: ${r.refnum}</div>` : ''}
        </div>
        <div class="req-right">
          ${dueLabel}
          <span class="tag tag-status-${r.status}">${r.status}</span>
        </div>
      </div>`;
    }).join('');

    return `<div class="case-card" style="--case-color:${statusColor(cs)}">
      <div class="case-card-header" onclick="openDetail('${c.id}')">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="case-id">${c.id}</span>
            ${c.ready==='yes'?'<span class="tag" style="background:rgba(39,174,96,0.15);color:var(--green)">READY</span>':''}
          </div>
          <div class="case-title">${c.name} ${potEmoji}</div>
          <div class="case-sub">${reqs.length} request${reqs.length!==1?'s':''} · ${reqs.filter(r=>r.status==='received').length} received</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEdit('${c.id}')">Edit</button>
        </div>
      </div>
      ${reqs.length ? `<div class="requests-strip">${reqRows}</div>` : ''}
    </div>`;
  }).join('');
}

document.getElementById('search-input').addEventListener('input', renderCases);
document.getElementById('filter-status').addEventListener('change', renderCases);
document.getElementById('filter-state').addEventListener('change', renderCases);

// ── DEADLINES VIEW ──
function renderDeadlines() {
  const all = allRequests()
    .filter(r => r.dueDate)
    .map(r => ({ ...r, days: daysUntil(r.dueDate) }))
    .sort((a,b) => a.days - b.days);

  const el = document.getElementById('deadlines-list');
  if (!all.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div>No deadlines set yet.</div>';
    return;
  }
  el.innerHTML = all.map(r => {
    const done = ['received','closed','denied'].includes(r.status);
    const od = !done && r.days < 0;
    const label = done ? '✓ Done' : od ? `${Math.abs(r.days)}d OVERDUE` : r.days===0 ? 'DUE TODAY' : `${r.days}d remaining`;
    const color = done ? 'var(--muted)' : od ? 'var(--red)' : r.days<=3 ? 'var(--orange)' : 'var(--green)';
    return `<div class="deadline-item" onclick="openDetail('${r.caseId}','${r.rid}')">
      <div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--accent)">${r.caseId} · ${r.rid}</div>
        <div style="font-size:14px;font-weight:500">${r.caseName}</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted)">${r.agency}${r.state?' · '+r.state:''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:var(--mono);font-size:12px;font-weight:700;color:${color}">${label}</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px">${fmtDate(r.dueDate)}</div>
        <span class="tag tag-status-${r.status}" style="margin-top:4px;display:inline-block">${r.status}</span>
      </div>
    </div>`;
  }).join('');
}

// ── REQUEST EDITOR (inside case modal) ──
function renderRequestsEditor() {
  const ed = document.getElementById('requests-editor');
  if (!draftRequests.length) {
    draftRequests = [blankRequest('R1')];
  }
  ed.innerHTML = draftRequests.map((r, i) => `
    <div class="req-editor-card" data-idx="${i}">
      <div class="req-editor-card-header">
        <span class="req-editor-label">Request ${r.rid}</span>
        ${draftRequests.length > 1 ? `<button class="btn btn-danger btn-xs" onclick="removeRequest(${i})">Remove</button>` : ''}
      </div>
      <div class="req-editor-grid">
        <div class="form-group">
          <label>Agency / Department *</label>
          <input type="text" placeholder="e.g. Bixby Police Dept" value="${esc(r.agency)}" oninput="draftRequests[${i}].agency=this.value" />
        </div>
        <div class="form-group">
          <label>State</label>
          <input type="text" placeholder="e.g. OK" maxlength="2" style="text-transform:uppercase" value="${esc(r.state)}" oninput="draftRequests[${i}].state=this.value.toUpperCase()" />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select onchange="draftRequests[${i}].status=this.value">
            ${['pending','submitted','received','denied','appealing','delayed','closed'].map(s =>
              `<option value="${s}"${r.status===s?' selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`
            ).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Reference / Tracking #</label>
          <input type="text" placeholder="Agency's request ID" value="${esc(r.refnum)}" oninput="draftRequests[${i}].refnum=this.value" />
        </div>
        <div class="form-group">
          <label>Date Submitted</label>
          <input type="date" value="${r.submittedDate||''}" oninput="draftRequests[${i}].submittedDate=this.value" />
        </div>
        <div class="form-group">
          <label>Response Due Date</label>
          <input type="date" value="${r.dueDate||''}" oninput="draftRequests[${i}].dueDate=this.value" />
        </div>
        <div class="form-group">
          <label>Portal / Contact URL</label>
          <input type="url" placeholder="https://..." value="${esc(r.portal)}" oninput="draftRequests[${i}].portal=this.value" />
        </div>
        <div class="form-group full">
          <label>What Was Requested</label>
          <textarea placeholder="Describe what footage/docs you requested from this agency..." oninput="draftRequests[${i}].request=this.value">${esc(r.request)}</textarea>
        </div>
      </div>
    </div>
  `).join('');
}

function blankRequest(rid) {
  return { rid, agency:'', state:'', status:'pending', submittedDate: today(), dueDate:'', portal:'', refnum:'', request:'' };
}

function removeRequest(i) {
  draftRequests.splice(i, 1);
  // re-number
  draftRequests = draftRequests.map((r, idx) => ({ ...r, rid: `R${idx+1}` }));
  renderRequestsEditor();
}

document.getElementById('add-req-btn').addEventListener('click', () => {
  draftRequests.push(blankRequest(`R${draftRequests.length+1}`));
  renderRequestsEditor();
});

function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── CASE MODAL ──
document.getElementById('add-case-btn').addEventListener('click', openAddModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('case-modal').addEventListener('click', e => { if (e.target.id==='case-modal') closeModal(); });

function openAddModal() {
  editingId = null;
  document.getElementById('modal-mode-label').textContent = 'New Case';
  document.getElementById('delete-case-btn').style.display = 'none';
  document.getElementById('f-name').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-potential').value = '';
  document.getElementById('f-ready').value = 'no';
  draftRequests = [blankRequest('R1')];
  draftRequests[0].submittedDate = today();
  renderRequestsEditor();
  document.getElementById('case-modal').classList.add('open');
}

function openEdit(id) {
  const c = cases.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById('modal-mode-label').textContent = `Edit — ${id}`;
  document.getElementById('delete-case-btn').style.display = '';
  document.getElementById('f-name').value = c.name || '';
  document.getElementById('f-notes').value = c.notes || '';
  document.getElementById('f-potential').value = c.potential || '';
  document.getElementById('f-ready').value = c.ready || 'no';
  draftRequests = JSON.parse(JSON.stringify(c.requests || [blankRequest('R1')]));
  renderRequestsEditor();
  document.getElementById('case-modal').classList.add('open');
}

function closeModal() { document.getElementById('case-modal').classList.remove('open'); }

document.getElementById('modal-save').addEventListener('click', () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Case name is required.'); return; }
  if (!draftRequests.some(r => r.agency.trim())) { toast('At least one request needs an agency.'); return; }

  if (editingId) {
    const idx = cases.findIndex(c => c.id === editingId);
    cases[idx] = {
      ...cases[idx],
      name,
      notes: document.getElementById('f-notes').value.trim(),
      potential: document.getElementById('f-potential').value,
      ready: document.getElementById('f-ready').value,
      requests: draftRequests.map(r => ({ ...r, state: (r.state||'').toUpperCase() })),
      updatedAt: new Date().toISOString(),
    };
    toast('Case updated.');
  } else {
    const c = {
      id: genCaseId(),
      name,
      notes: document.getElementById('f-notes').value.trim(),
      potential: document.getElementById('f-potential').value,
      ready: document.getElementById('f-ready').value,
      requests: draftRequests.map(r => ({ ...r, state: (r.state||'').toUpperCase() })),
      timeline: [],
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    };
    cases.push(c);
    toast(`Case ${c.id} created.`);
  }
  save();
  closeModal();
  renderAll();
});

document.getElementById('delete-case-btn').addEventListener('click', () => {
  if (!editingId || !confirm('Delete this case and all its requests?')) return;
  cases = cases.filter(c => c.id !== editingId);
  save(); closeModal(); renderAll(); toast('Case deleted.');
});

// ── DETAIL MODAL ──
function openDetail(caseId, focusRid) {
  const c = cases.find(x => x.id === caseId);
  if (!c) return;
  const reqs = c.requests || [];

  document.getElementById('detail-id').textContent = c.id;
  document.getElementById('detail-name').textContent = c.name;

  const reqCards = reqs.map(r => {
    const days = r.dueDate ? daysUntil(r.dueDate) : null;
    const dueStr = r.dueDate
      ? (days < 0 ? `${fmtDate(r.dueDate)} (${Math.abs(days)}d overdue)` : days===0 ? `${fmtDate(r.dueDate)} (TODAY)` : `${fmtDate(r.dueDate)} (${days}d left)`)
      : '—';
    const highlight = focusRid && r.rid === focusRid ? 'border-color:var(--accent)' : '';
    return `<div class="req-detail-card" style="--req-color:${statusColor(r.status)};${highlight}" id="req-${r.rid}">
      <div class="req-detail-header">
        <div>
          <div class="req-detail-title">${r.rid} — ${r.agency}${r.state?' · '+r.state:''}</div>
          ${r.refnum ? `<div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px">REF: ${r.refnum}</div>` : ''}
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="tag tag-status-${r.status}">${r.status}</span>
          <select style="font-family:var(--mono);font-size:11px;padding:4px 8px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text)" onchange="quickReqStatus('${c.id}','${r.rid}',this.value)">
            <option value="">Change status…</option>
            ${['pending','submitted','received','denied','appealing','delayed','closed'].map(s => `<option value="${s}">${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="detail-grid" style="margin-bottom:${r.request?'10px':'0'}">
        <div class="detail-item"><div class="detail-label">Filed</div><div class="detail-value">${fmtDate(r.submittedDate)}</div></div>
        <div class="detail-item"><div class="detail-label">Due</div><div class="detail-value ${days!==null&&days<0&&!['received','closed'].includes(r.status)?'overdue':''}">${dueStr}</div></div>
      </div>
      ${r.request ? `<div style="font-size:12px;color:var(--muted);line-height:1.5;margin-top:6px">${r.request.replace(/\n/g,'<br>')}</div>` : ''}
      ${r.portal ? `<div style="margin-top:8px"><a href="${r.portal}" target="_blank" style="font-family:var(--mono);font-size:11px;color:var(--blue)">🔗 Open Portal</a></div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">Case Overview</div>
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-label">Potential</div><div class="detail-value">${{high:'🔥 High',medium:'📈 Medium',low:'📉 Low'}[c.potential]||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">Edit Ready?</div><div class="detail-value">${{yes:'✅ Ready',no:'❌ Not yet',partial:'⚡ Partial'}[c.ready]||'—'}</div></div>
      </div>
      ${c.notes ? `<div style="font-size:13px;line-height:1.6;color:var(--text);margin-top:12px">${c.notes.replace(/\n/g,'<br>')}</div>` : ''}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">FOIA Requests (${reqs.length})</div>
      ${reqCards || '<div style="color:var(--muted);font-size:12px">No requests logged.</div>'}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Timeline / Updates</div>
      <div class="notes-list" id="timeline-list">
        ${(c.timeline||[]).map(n => `<div class="note-item"><div class="note-ts">${new Date(n.ts).toLocaleString()}</div><div class="note-text">${n.text}</div></div>`).join('') || '<div style="color:var(--muted);font-size:12px;font-family:var(--mono)">No updates yet.</div>'}
      </div>
      <div class="note-input-row">
        <input id="note-input" type="text" placeholder="Log an update (e.g. 'Got extension on R2', 'R1 footage received')..." />
        <button class="btn btn-ghost btn-sm" onclick="addNote('${c.id}')">Log</button>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-ghost btn-sm" onclick="openEdit('${c.id}');document.getElementById('detail-modal').classList.remove('open')">Edit Case</button>
    </div>
  `;

  document.getElementById('detail-modal').classList.add('open');

  // scroll to focused request
  if (focusRid) {
    setTimeout(() => {
      const el = document.getElementById('req-' + focusRid);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  }

  document.getElementById('note-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addNote(c.id);
  });
}

function quickReqStatus(caseId, rid, val) {
  if (!val) return;
  const c = cases.find(x => x.id === caseId);
  if (!c) return;
  const r = (c.requests||[]).find(x => x.rid === rid);
  if (!r) return;
  r.status = val;
  if (!c.timeline) c.timeline = [];
  c.timeline.push({ ts: new Date().toISOString(), text: `${rid} (${r.agency}) status → ${val}` });
  c.updatedAt = new Date().toISOString();
  // update ready flag auto
  if (val === 'received' && (c.requests||[]).every(x => x.status==='received')) c.ready = 'yes';
  save();
  renderAll();
  toast(`${rid} → ${val}`);
  openDetail(caseId, rid);
}

function addNote(id) {
  const input = document.getElementById('note-input');
  const text = input.value.trim();
  if (!text) return;
  const c = cases.find(x => x.id === id);
  if (!c) return;
  if (!c.timeline) c.timeline = [];
  c.timeline.push({ ts: new Date().toISOString(), text });
  save();
  input.value = '';
  const list = document.getElementById('timeline-list');
  list.innerHTML = c.timeline.map(n => `<div class="note-item"><div class="note-ts">${new Date(n.ts).toLocaleString()}</div><div class="note-text">${n.text}</div></div>`).join('');
  renderAll();
}

document.getElementById('detail-close').addEventListener('click', () => document.getElementById('detail-modal').classList.remove('open'));
document.getElementById('detail-modal').addEventListener('click', e => { if (e.target.id==='detail-modal') document.getElementById('detail-modal').classList.remove('open'); });

// ── INIT ──
renderAll();
</script>
</body>
</html>
